<!DOCTYPE html>

    <!-- Security headers will be set via nginx in production -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Preload LCP image for faster rendering (desktop gets full size, mobile gets small) -->

    <link rel="preload" href="/brewhouse-sm.webp" as="image" type="image/webp" media="(max-width: 768px)" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Self-hosted Inter font — eliminates 2 render-blocking external requests -->
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400 700;
        font-display: optional;
        src: url(/fonts/inter-latin.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;

      }
    </style>
